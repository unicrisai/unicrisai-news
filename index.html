<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNICRIS AI // Intelligence Hub</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f9f9f9; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .hub-container { background: white; padding: 50px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); max-width: 450px; width: 90%; border-top: 8px solid #ffcc00; }
        h1 { font-weight: 900; letter-spacing: -1.5px; margin: 0 0 10px 0; font-size: 36px; }
        p { color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; font-weight: bold; }
        .latest-btn { display: block; background: #ffcc00; color: #000; padding: 20px; text-decoration: none; font-weight: 900; font-size: 18px; border-radius: 8px; margin-bottom: 25px; transition: 0.2s; }
        .latest-btn:hover { background: #000; color: #ffcc00; transform: translateY(-3px); }
        .archive-box { border-top: 1px solid #eee; padding-top: 25px; }
        select { width: 100%; padding: 12px; border-radius: 6px; border: 2px solid #eee; font-family: inherit; font-weight: bold; cursor: pointer; background: #fff; }
        select:focus { border-color: #ffcc00; outline: none; }
    </style>
</head>
<body>
    <div class="hub-container">
        <h1>UNICRIS AI</h1>
        <p>Deep Tech & SEA Market Intelligence</p>
        
        <a href="./archive/digest-2026-04-04.html" class="latest-btn">READ LATEST REPORT →</a>

        <div class="archive-box">
            <label style="display:block; font-size: 11px; margin-bottom: 10px; font-weight: 800; color: #aaa;">EXPLORE ARCHIVE</label>
            <select id="archive" onchange="if(this.value != '#') location = this.value;">
                <option value="#">Select a past date...</option>
                </select>
        </div>
    </div>

    <script>
        const select = document.getElementById('archive');
        const today = new Date();
        // Generates the last 14 days of links automatically
        for (let i = 0; i < 14; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() - i);
            const dateString = date.toISOString().split('T')[0];
            const option = document.createElement('option');
            option.value = `./archive/digest-${dateString}.html`;
            option.textContent = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            select.appendChild(option);
        }
    </script>
</body>
</html>
