name: Update News

on:
  schedule:
    # Runs at 01:00 UTC (8:00 AM Bangkok)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows manual testing from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-genai feedparser

      - name: Run News Script
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # We add all three files to ensure the archive and database are preserved
          git add index.html archive.html data.json
          git commit -m "Update news and archive: $(date)" || echo "No changes to commit"
          git push
